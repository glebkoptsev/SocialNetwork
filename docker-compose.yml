name: socialnetwork

networks:
  main-network:
    driver: bridge

services:
  # ── Database ────────────────────────────────────────────────
  postgres:
    container_name: sn_postgres
    image: postgres:16
    command: >
      postgres
      -c max_connections=500
      -c wal_level=replica
      -c max_wal_senders=5
      -c wal_keep_size=256
      -c hot_standby=on
      -c shared_buffers=256MB
      -c work_mem=64MB
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: socialnetwork
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/master/init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh
    networks: [main-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres_replica:
    container_name: sn_postgres_replica
    image: postgres:16
    command: >
      bash -c "
      until pg_isready -h postgres -U postgres -p 5432; do echo 'Waiting for master...'; sleep 2; done;
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Running pg_basebackup...';
        rm -rf /var/lib/postgresql/data/*;
        PGPASSWORD=$$POSTGRES_PASSWORD pg_basebackup -h postgres -U replicator -D /var/lib/postgresql/data -Fp -Xs -R -P -v;
        chown -R postgres:postgres /var/lib/postgresql/data;
      fi;
      exec docker-entrypoint.sh postgres -c 'hot_standby=on' -c 'max_connections=500'
      "
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgreplica:/var/lib/postgresql/data
    networks: [main-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    container_name: sn_redis
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy volatile-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks: [main-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── RabbitMQ ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sn_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: socialnetwork
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks: [main-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── .NET Services ──────────────────────────────────────────
  user_api:
    container_name: sn_user_api
    build:
      context: .
      dockerfile: UserService.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD};database=socialnetwork;Maximum Pool Size=200;Multiplexing=true
      - ConnectionStrings__postgres_replica=Host=postgres_replica:5432;User id=postgres;Password=${POSTGRES_PASSWORD};database=socialnetwork;Maximum Pool Size=200;Multiplexing=true
      - JwtSettings__Secret=${JWT_SECRET}
      - RabbitMQSettings__Password=${RABBITMQ_PASSWORD}
      - CORS__AllowedOrigins=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [main-network]
    restart: unless-stopped

  dialog_api:
    container_name: sn_dialog_api
    build:
      context: .
      dockerfile: DialogService.API/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD};database=socialnetwork;Maximum Pool Size=200;Multiplexing=true
      - ConnectionStrings__postgres_replica=Host=postgres_replica:5432;User id=postgres;Password=${POSTGRES_PASSWORD};database=socialnetwork;Maximum Pool Size=200;Multiplexing=true
      - JwtSettings__Secret=${JWT_SECRET}
      - CORS__AllowedOrigins=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      postgres_replica:
        condition: service_healthy
      redis:
        condition: service_healthy
      user_api:
        condition: service_started
    networks: [main-network]
    restart: unless-stopped

  cache_update:
    container_name: sn_cache_update
    build:
      context: .
      dockerfile: UserService.CacheUpdateService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD};database=socialnetwork;Maximum Pool Size=200;Multiplexing=true
      - ConnectionStrings__postgres_replica=Host=postgres_replica:5432;User id=postgres;Password=${POSTGRES_PASSWORD};database=socialnetwork;Maximum Pool Size=200;Multiplexing=true
      - AuthService__URL=http://user_api:8080/api/security/login
      - AuthService__Login=system
      - AuthService__Password=placeholder
      - RabbitMQSettings__Password=${RABBITMQ_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user_api:
        condition: service_started
    networks: [main-network]
    restart: unless-stopped

  # ── Seeders (run-once) ─────────────────────────────────────
  users_generator:
    container_name: sn_users_generator
    build:
      context: .
      dockerfile: UserService.UsersGenerator/Dockerfile
    environment:
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD};database=socialnetwork
    depends_on:
      postgres:
        condition: service_healthy
    networks: [main-network]
    profiles: [seed]

  posts_generator:
    container_name: sn_posts_generator
    build:
      context: .
      dockerfile: UserService.PostsGenerator/Dockerfile
    environment:
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD};database=socialnetwork
    depends_on:
      postgres:
        condition: service_healthy
    networks: [main-network]
    profiles: [seed]

  cache_warmup:
    container_name: sn_cache_warmup
    build:
      context: .
      dockerfile: UserService.CacheWarmup/Dockerfile
    environment:
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD};database=socialnetwork
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [main-network]
    profiles: [seed]

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    container_name: sn_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_DIALOG_API_URL=http://localhost:5002
      - NEXT_PUBLIC_SIGNALR_URL=http://localhost:5000
    depends_on:
      user_api:
        condition: service_started
      dialog_api:
        condition: service_started
    networks: [main-network]
    restart: unless-stopped

volumes:
  pgdata:
  pgreplica:
  redisdata:
  rabbitmqdata:
