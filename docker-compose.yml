name: socialnetwork

networks:
  main-network:
    driver: bridge

services:
  # ── Databases ──────────────────────────────────────────────
  postgres:
    container_name: sn_postgres
    image: postgres:16
    command: -c max_connections=500
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-7g0WfNsQziV5r5P}
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      main-network:
        aliases:
          - user_service_postgres
          - user_service_postgres_slave_first
          - user_service_postgres_slave_second
    restart: unless-stopped

  dialog_postgres:
    container_name: sn_dialog_postgres
    image: postgres:16
    command: -c max_connections=200
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-7g0WfNsQziV5r5P}
      POSTGRES_DB: dialogdb
    ports:
      - "5433:5432"
    volumes:
      - pgdialog:/var/lib/postgresql/data
    networks: [main-network]
    restart: unless-stopped

  redis:
    container_name: sn_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks: [main-network]
    restart: unless-stopped

  # ── Kafka ──────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: sn_zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [main-network]
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: sn_kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_CREATE_TOPICS: feed-posts:1:1
    networks: [main-network]
    restart: unless-stopped

  # ── .NET Services ──────────────────────────────────────────
  user_api:
    container_name: sn_user_api
    build:
      context: .
      dockerfile: UserService.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__postgres=Host=user_service_postgres:5432,user_service_postgres_slave_first:5432,user_service_postgres_slave_second:5432;User id=postgres;Password=${POSTGRES_PASSWORD:-7g0WfNsQziV5r5P};database=userdb
      - JwtSettings__Secret=${JWT_SECRET:-c8ea2ac5-0ca5-436b-af45-2033c4985a8a}
    depends_on: [postgres, redis, kafka]
    networks: [main-network]
    restart: unless-stopped

  dialog_api:
    container_name: sn_dialog_api
    build:
      context: .
      dockerfile: DialogService.API/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__postgres=Host=dialog_postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD:-7g0WfNsQziV5r5P};database=dialogdb
      - JwtSettings__Secret=${JWT_SECRET:-c8ea2ac5-0ca5-436b-af45-2033c4985a8a}
    depends_on: [dialog_postgres, redis, user_api]
    networks: [main-network]
    restart: unless-stopped

  livefeed:
    container_name: sn_livefeed
    build:
      context: .
      dockerfile: UserService.LiveFeedService/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JwtSettings__Secret=${JWT_SECRET:-c8ea2ac5-0ca5-436b-af45-2033c4985a8a}
    depends_on: [user_api]
    networks: [main-network]
    restart: unless-stopped

  cache_update:
    container_name: sn_cache_update
    build:
      context: .
      dockerfile: UserService.CacheUpdateService/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD:-7g0WfNsQziV5r5P};database=userdb
      - AuthService__URL=http://user_api:8080/api/security/login
      - AuthService__Login=system
      - AuthService__Password=placeholder
    depends_on: [postgres, redis, kafka, livefeed, user_api]
    networks: [main-network]
    restart: unless-stopped

  feed_client:
    container_name: sn_feed_client
    build:
      context: .
      dockerfile: UserService.FeedClient/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Production
      - AuthService__URL=http://user_api:8080/api/security/login
      - AuthService__Login=system
      - AuthService__Password=placeholder
    depends_on: [livefeed, user_api]
    networks: [main-network]
    restart: unless-stopped

  # ── Seeders (run-once) ─────────────────────────────────────
  users_generator:
    container_name: sn_users_generator
    build:
      context: .
      dockerfile: UserService.UsersGenerator/Dockerfile
    environment:
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD:-7g0WfNsQziV5r5P};database=userdb
    depends_on: [postgres]
    networks: [main-network]
    profiles: [seed]

  posts_generator:
    container_name: sn_posts_generator
    build:
      context: .
      dockerfile: UserService.PostsGenerator/Dockerfile
    environment:
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD:-7g0WfNsQziV5r5P};database=userdb
    depends_on: [postgres]
    networks: [main-network]
    profiles: [seed]

  cache_warmup:
    container_name: sn_cache_warmup
    build:
      context: .
      dockerfile: UserService.CacheWarmup/Dockerfile
    environment:
      - ConnectionStrings__postgres=Host=postgres:5432;User id=postgres;Password=${POSTGRES_PASSWORD:-7g0WfNsQziV5r5P};database=userdb
    depends_on: [postgres, redis]
    networks: [main-network]
    profiles: [seed]

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    container_name: sn_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_DIALOG_API_URL=http://localhost:5002
      - NEXT_PUBLIC_SIGNALR_URL=http://localhost:5003
    depends_on: [user_api, dialog_api, livefeed]
    networks: [main-network]
    restart: unless-stopped

volumes:
  pgdata:
  pgdialog:
  redisdata:
